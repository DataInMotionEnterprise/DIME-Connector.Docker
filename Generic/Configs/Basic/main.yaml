app:
  license: 0000-0000-0000-0000-0000-0000-0000-0000
  ring_buffer: !!int 4096
  http_server_uri: http://0.0.0.0:9999/
  ws_server_uri: ws://0.0.0.0:9998/
sinks:
  - name: consoleSink
    enabled: !!bool true
    scan_interval: !!int 1000
    connector: console
  - name: httpServerSink
    enabled: !!bool true
    scan_interval: !!int 1000
    connector: httpServer
    uri: http://0.0.0.0:8080/
    use_sink_transform: !!bool false
  - name: websocketServerSink
    connector: websocketServer
    uri: ws://0.0.0.0:8092/
    use_sink_transform: !!bool false
  - name: webServerSink
    enabled: !!bool true
    connector: webServer
    uri: http://0.0.0.0:8090/
    web_root: ./Configs/web
    exclude_filter:
      - .*
sources:
  - name: scriptSource
    enabled: !!bool true
    scan_interval: !!int 1000
    connector: script
    rbe: !!bool true
    init_script: counter = 0
    items:
      - name: Counter1
        enabled: !!bool true
        script: |
          counter = counter + 1
          return counter